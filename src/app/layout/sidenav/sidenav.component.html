<aside
  #sidebar
  id="app-sidebar"
  role="navigation"
  aria-lable="Main Navigation"
  class="layout-sidebar"
  [class.open]="open"
>
  <nav>
    @for (item of navItems; track item.route) {
      @if (auth.hasAccess(item.permission)) {
        <a [routerLink]="item.route" routerLinkActive="active">{{ item.label }}</a>
      }
    }
  </nav>
</aside>
@if (open) {
  <div class="sidebar-backdrop" (click)="close.emit()" aria-hidden="true"></div>
}
