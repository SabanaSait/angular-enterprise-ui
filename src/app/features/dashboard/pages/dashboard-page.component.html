<div class="page-header">
  <h1>Dashboard</h1>
  <p>Overview of system activity.</p>
</div>
@switch (metricsState().status) {
  @case ('loading') {
    <app-loading-state></app-loading-state>
  }
  @case ('error') {
    <app-error-state
      errorTitle="Unable to load dashboard metrics"
      errorDescription="Please try again later."
    ></app-error-state>
  }
  @default {
    <div class="stat-cards">
      <app-stat-card
        label="Total Users"
        [value]="metricsState().data?.totalUsers || 0"
      ></app-stat-card>
      <app-stat-card
        label="Active Users"
        [value]="metricsState().data?.activeUsers || 0"
      ></app-stat-card>
      <app-stat-card
        label="Inactive Users"
        [value]="metricsState().data?.inactiveUsers || 0"
      ></app-stat-card>
      <app-stat-card
        label="Admin Users"
        [value]="metricsState().data?.adminUsersCount || 0"
      ></app-stat-card>
      <app-stat-card
        label="Supervisors"
        [value]="metricsState().data?.supervisorsCount || 0"
      ></app-stat-card>
      <app-stat-card
        label="General Users"
        [value]="metricsState().data?.generalUsersCount || 0"
      ></app-stat-card>
    </div>
  }
}
