<div class="page-header">
  <h1>Dashboard</h1>
  <p>Overview of system activity</p>
</div>
<div class="stat-cards">
  <app-stat-card label="Total Users" [value]="metricsState().data?.totalUsers || 0"></app-stat-card>
  <app-stat-card
    label="Active Users"
    [value]="metricsState().data?.activeUsers || 0"
  ></app-stat-card>
  <app-stat-card
    label="Inactive Users"
    [value]="metricsState().data?.inactiveUsers || 0"
  ></app-stat-card>
  <app-stat-card
    label="Admin Users"
    [value]="metricsState().data?.activeUsers || 0"
  ></app-stat-card>
</div>
