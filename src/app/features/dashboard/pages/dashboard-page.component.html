<div class="page-header">
  <h1 i18n="@@dashboard.page.title">Dashboard</h1>
  <p i18n="@@dashboard.page.subtitle">Overview of system activity.</p>
</div>
@switch (metricsState().status) {
  @case ('loading') {
    <app-loading-state></app-loading-state>
  }
  @case ('error') {
    <app-error-state
      errorTitle="Unable to load dashboard metrics"
      errorDescription="Please try again later."
      i18n-errorTitle="@@dashboard.page.error.title"
      i18n-errorDescription="@@dashboard.page.error.description"
    ></app-error-state>
  }
  @default {
    @let m = metrics();
    @let total = m?.totalUsers ?? 0;
    @if (total > 0) {
      <ul class="stat-cards">
        <li>
          <app-stat-card
            label="Total Users"
            [value]="total"
            i18n-label="@@dashboard.stats.totalUsers"
          ></app-stat-card>
        </li>
        <li>
          <app-stat-card
            label="Active Users"
            [value]="m?.activeUsers || 0"
            i18n-label="@@dashboard.stats.activeUsers"
          ></app-stat-card>
        </li>
        <li>
          <app-stat-card
            label="Inactive Users"
            [value]="m?.inactiveUsers || 0"
            i18n-label="@@dashboard.stats.inactiveUsers"
          ></app-stat-card>
        </li>
        <li>
          <app-stat-card
            label="Admin Users"
            [value]="m?.adminUsersCount || 0"
            i18n-label="@@dashboard.stats.adminUsers"
          ></app-stat-card>
        </li>
        <li>
          <app-stat-card
            label="Supervisors"
            [value]="m?.supervisorsCount || 0"
            i18n-label="@@dashboard.stats.supervisors"
          ></app-stat-card>
        </li>
        <li>
          <app-stat-card
            label="General Users"
            [value]="m?.generalUsersCount || 0"
            i18n-label="@@dashboard.stats.generalUsers"
          ></app-stat-card>
        </li>
      </ul>
    } @else {
      <app-empty-state
        heading="No metrics available"
        description="Metrics will appear once users are added to the system."
        actionLabel="Go to Users"
        i18n-heading="@@dashboard.empty.heading"
        i18n-description="@@dashboard.empty.description"
        i18n-actionLabel="@@dashboard.empty.action"
        (action)="goToUsers()"
      ></app-empty-state>
    }
  }
}
