<div class="page-header">
  <h1>Dashboard</h1>
  <p>Overview of system activity.</p>
</div>
@switch (metricsState().status) {
  @case ('loading') {
    <app-loading-state></app-loading-state>
  }
  @case ('error') {
    <app-error-state
      errorTitle="Unable to load dashboard metrics"
      errorDescription="Please try again later."
    ></app-error-state>
  }
  @default {
    @let metrics = metricsState().data;
    @if (metrics?.totalUsers) {
      <ul class="stat-cards">
        <li>
          <app-stat-card label="Total Users" [value]="metrics?.totalUsers || 0"> </app-stat-card>
        </li>
        <li>
          <app-stat-card label="Active Users" [value]="metrics?.activeUsers || 0"></app-stat-card>
        </li>
        <li>
          <app-stat-card
            label="Inactive Users"
            [value]="metrics?.inactiveUsers || 0"
          ></app-stat-card>
        </li>
        <li>
          <app-stat-card
            label="Admin Users"
            [value]="metrics?.adminUsersCount || 0"
          ></app-stat-card>
        </li>
        <li>
          <app-stat-card
            label="Supervisors"
            [value]="metrics?.supervisorsCount || 0"
          ></app-stat-card>
        </li>
        <li>
          <app-stat-card
            label="General Users"
            [value]="metrics?.generalUsersCount || 0"
          ></app-stat-card>
        </li>
      </ul>
    } @else {
      <app-empty-state
        heading="No metrics available"
        description="Metrics will appear once users are added to the system."
        actionLabel="Go to Users"
        (action)="goToUsers()"
      ></app-empty-state>
    }
  }
}
