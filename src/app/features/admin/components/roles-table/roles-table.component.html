<div class="data-table-wrapper">
  <table aria-label="Roles list">
    <thead>
      <tr>
        <th scope="col">Name</th>
        <th scope="col">Code</th>
        <th scope="col">Description</th>
        <th scope="col">Type</th>
        <th scope="col">Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (role of roles; track role) {
        <tr>
          <td>{{ role.name }}</td>
          <td>{{ role.code }}</td>
          <td>{{ role.description }}</td>
          <td>
            <app-badge
              [label]="role.system ? 'System' : 'Custom'"
              [variant]="role.system ? 'neutral' : 'info'"
            ></app-badge>
          </td>
          <td class="actions">
            <button
              class="btn btn-ghost"
              type="button"
              title="View details"
              aria-label="View details of role {{ role.name }}"
              (click)="viewRoleDetails(role.id)"
            >
              <span aria-hidden="true">👁</span>
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
