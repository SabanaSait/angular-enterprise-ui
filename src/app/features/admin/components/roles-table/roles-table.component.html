<div class="data-table-wrapper">
  <table aria-label="Roles list" i18n-aria-label="@@admin.roles.table.aria.label">
    <thead>
      <tr>
        <th scope="col" i18n="@@admin.roles.table.name">Name</th>
        <th scope="col" i18n="@@admin.roles.table.code">Code</th>
        <th scope="col" i18n="@@admin.roles.table.description">Description</th>
        <th scope="col" i18n="@@admin.roles.table.type">Type</th>
        <th scope="col" i18n="@@admin.roles.table.actions">Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (role of roles; track role) {
        <tr>
          <td>{{ role.name }}</td>
          <td>{{ role.code }}</td>
          <td>{{ role.description }}</td>
          <td>
            @if (role.system) {
              <app-badge
                label="System"
                [variant]="'neutral'"
                i18n-label="@@admin.roles.table.type.system"
              ></app-badge>
            } @else {
              <app-badge
                label="Custom"
                [variant]="'info'"
                i18n-label="@@admin.roles.table.type.custom"
              ></app-badge>
            }
          </td>
          <td class="actions">
            <button
              class="btn btn-ghost"
              type="button"
              title="View details"
              aria-label="View details of role {{ role.name }}"
              i18n-title="@@admin.roles.table.view.title"
              i18n-aria-label="@@admin.roles.table.view.aria"
              (click)="viewRoleDetails(role.id)"
            >
              <span aria-hidden="true">👁</span>
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
