<div class="role-table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Code</th>
        <th>Description</th>
        <th>Type</th>
        <!-- <th>Actions</th> -->
      </tr>
    </thead>
    <tbody>
      @for (role of roles; track role) {
        <tr>
          <td>{{ role.name }}</td>
          <td>{{ role.code }}</td>
          <td>{{ role.description }}</td>
          <td>{{ role.system ? 'System' : 'Custom' }}</td>
          <!-- <td class="actions">
          <button class="btn btn-ghost" type="button" title="Edit role" aria-label="Edit role">
            ✏️
          </button>
          <button class="btn btn-ghost" type="button" title="Delete role" aria-label="Delete role">
            🗑
          </button>
        </td> -->
        </tr>
      }
    </tbody>
  </table>
</div>
