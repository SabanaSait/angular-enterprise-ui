<div class="data-table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Code</th>
        <th>Description</th>
        <th>Type</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (role of roles; track role) {
        <tr>
          <td>{{ role.name }}</td>
          <td>{{ role.code }}</td>
          <td>{{ role.description }}</td>
          <td>
            <app-badge
              [label]="role.system ? 'System' : 'Custom'"
              [variant]="role.system ? 'neutral' : 'info'"
            ></app-badge>
          </td>
          <td class="actions">
            <button
              class="btn btn-ghost"
              type="button"
              title="View details"
              aria-label="View details"
              (click)="viewRoleDetails(role.id)"
            >
              👁
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
