@let status = roleState().status;

@switch (status) {
  @case ('loading') {
    <app-loading-state></app-loading-state>
  }
  @case ('error') {
    <app-error-state
      errorTitle="Unable to load roles"
      errorDescription="Please try again later."
    ></app-error-state>
  }
  @default {
    @if (roles().length) {
      <app-roles-table [roles]="roles()"></app-roles-table>
    } @else {
      <app-empty-state
        title="No roles available"
        description="Roles define access levels in the system. System roles will appear here once configured."
      ></app-empty-state>
    }
  }
}
