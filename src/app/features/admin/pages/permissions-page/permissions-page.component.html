@switch (permissionsSate().status) {
  @case ('loading') {
    <app-loading-state></app-loading-state>
  }
  @case ('error') {
    <app-error-state
      errorTitle="Unable to load permissions"
      errorDescription="Please try again later."
    ></app-error-state>
  }
  @default {
    @if (permissions().length) {
      <app-permissions-table [permissions]="permissions()"></app-permissions-table>
    } @else {
      <app-empty-state
        title="No permissions available"
        description="Permissions control access to features across the application. System permissions will appear here once available."
      ></app-empty-state>
    }
  }
}
