@switch (userState().status) { @case ('loading') {
<div>Show loading...</div>
} @case ('error') {
<div>Show error message here...</div>
} @case ('success') { @let users = userState().data?.entities ?? [];
<app-users-table
  [users]="users"
  [pageNumber]="pageQuery().pageNumber"
  [pageSize]="pageQuery().pageSize"
  [total]="userState().data?.total || 0"
  [loading]="loading()"
  (pageChange)="setPageNumber($event)"
></app-users-table>
} }
