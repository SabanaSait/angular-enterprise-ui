@if (users.length) {
  @if (loading) {
    <app-loading-state class="loading-overlay"></app-loading-state>
  }
  <div class="data-table-wrapper" [class.is-loading]="loading">
    <table aria-label="Users list" i18n-aria-label="@@users.table.aria.label">
      <thead>
        <tr>
          <th class="sort" scope="col">
            <button
              [disabled]="loading"
              [attr.aria-sort]="
                sortBy === 'name' ? (sortDirection === 'asc' ? 'ascending' : 'descending') : 'none'
              "
              aria-label="Sort by name"
              i18n-aria-label="@@users.table.sort.name.aria"
              (click)="toggleSort('name')"
            >
              <span i18n="@@users.table.name">Name</span>
              @if (sortBy === 'name') {
                <span class="sort-indicator">
                  {{ sortDirection === 'asc' ? '▲' : '▼' }}
                </span>
              }
            </button>
          </th>

          <th scope="col" i18n="@@users.table.email">Email</th>
          <th scope="col" i18n="@@users.table.role">Role</th>
          <th scope="col" i18n="@@users.table.status">Status</th>
          @if (canManageUsers) {
            <th scope="col" i18n="@@users.table.actions">Actions</th>
          }
        </tr>
      </thead>
      <tbody>
        @for (user of users; track user.id) {
          <tr>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.role | roleLabel }}</td>
            <td>
              <app-badge
                [label]="user.status | titlecase"
                [variant]="isActiveUser(user.status) ? 'success' : 'neutral'"
              ></app-badge>
            </td>
            @if (canManageUsers) {
              <td class="actions">
                <button
                  class="btn btn-ghost"
                  type="button"
                  title="Edit user"
                  aria-label="Edit user {{ user.name }}"
                  i18n-title="@@users.table.edit.title"
                  i18n-aria-label="@@users.table.edit.aria"
                  (click)="editUser.emit(user)"
                >
                  <span aria-hidden="true">✏️</span>
                </button>
                <button
                  class="btn btn-ghost"
                  type="button"
                  title="Delete user"
                  aria-label="Delete user {{ user.name }}"
                  i18n-title="@@users.table.delete.title"
                  i18n-aria-label="@@users.table.delete.aria"
                  (click)="deleteUser.emit(user)"
                >
                  <span aria-hidden="true">🗑</span>
                </button>
              </td>
            }
          </tr>
        }
      </tbody>
    </table>
  </div>
  <app-pagination
    [pageNumber]="pageNumber"
    [pageSize]="pageSize"
    [total]="total"
    [disabled]="loading"
    (pageChange)="pageChange.emit($event)"
  ></app-pagination>
} @else {
  @if (loading) {
    <app-loading-state></app-loading-state>
  } @else {
    @if (canManageUsers) {
      <app-empty-state
        class="no-border"
        heading="No users yet"
        description="Get started by adding your first user to the system."
        actionLabel="+ Add User"
        i18n-heading="@@users.table.empty.manage.heading"
        i18n-description="@@users.table.empty.manage.description"
        i18n-actionLabel="@@users.table.empty.manage.action"
        (action)="addUser.emit()"
      ></app-empty-state>
    } @else {
      <app-empty-state
        class="no-border"
        heading="No users yet"
        description="Users will appear here once they are added by an administrator."
        i18n-heading="@@users.table.empty.readonly.heading"
        i18n-description="@@users.table.empty.readonly.description"
      ></app-empty-state>
    }
  }
}
