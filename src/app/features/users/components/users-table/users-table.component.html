@if (users.length) {
  <div class="data-table-wrapper">
    <table aria-label="Users list">
      <thead>
        <tr>
          <th class="sort" scope="col">
            <button
              [disabled]="loading"
              [attr.aria-sort]="
                sortBy === 'name' ? (sortDirection === 'asc' ? 'ascending' : 'descending') : 'none'
              "
              aria-label="Sort by name"
              (click)="toggleSort('name')"
            >
              Name
              @if (sortBy === 'name') {
                <span class="sort-indicator">
                  {{ sortDirection === 'asc' ? '▲' : '▼' }}
                </span>
              }
            </button>
          </th>

          <th scope="col">Email</th>
          <th scope="col">Role</th>
          <th scope="col">Status</th>
          @if (canManageUsers) {
            <th scope="col">Actions</th>
          }
        </tr>
      </thead>
      <tbody>
        @for (user of users; track user.id) {
          <tr>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.role | roleLabel }}</td>
            <td>
              <app-badge
                [label]="user.status | titlecase"
                [variant]="isActiveUser(user.status) ? 'success' : 'neutral'"
              ></app-badge>
            </td>
            @if (canManageUsers) {
              <td class="actions">
                <button
                  class="btn btn-ghost"
                  type="button"
                  title="Edit user"
                  aria-label="Edit user {{ user.name }}"
                  (click)="editUser.emit(user)"
                >
                  <span aria-hidden="true">✏️</span>
                </button>
                <button
                  class="btn btn-ghost"
                  type="button"
                  title="Delete user"
                  aria-label="Delete user {{ user.name }}"
                  (click)="deleteUser.emit(user)"
                >
                  <span aria-hidden="true">🗑</span>
                </button>
              </td>
            }
          </tr>
        }
      </tbody>
    </table>
  </div>
  <app-pagination
    [pageNumber]="pageNumber"
    [pageSize]="pageSize"
    [total]="total"
    [disabled]="loading"
    (pageChange)="pageChange.emit($event)"
  ></app-pagination>
}

@if (!loading && users.length === 0) {
  <app-empty-state
    class="no-border"
    heading="No users yet"
    [description]="
      canManageUsers
        ? 'Get started by adding your first user to the system.'
        : 'Users will appear here once they are added by an administrator.'
    "
    [actionLabel]="canManageUsers ? '+ Add User' : ''"
    (action)="addUser.emit()"
  ></app-empty-state>
}
