<!-- show loading indicator while the data is loading -->
@if(users.length;) {
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Role</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody>
    @for (user of users; track user.id) {
    <tr>
      <td>{{ user.name }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.role }}</td>
      <td>{{ user.status }}</td>
    </tr>
    }
    <tr>
      <td></td>
    </tr>
  </tbody>
</table>

<app-pagination
  [pageNumber]="pageNumber"
  [pageSize]="pageSize"
  [total]="total"
  [disabled]="loading"
  (pageChange)="pageChange.emit($event)"
></app-pagination>

} @else {
<app-empty-state
  title="No users yet"
  description="Start by creating your first user"
  actionLabel="Create User"
  (action)="createUser.emit()"
></app-empty-state>
}
