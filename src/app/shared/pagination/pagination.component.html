<button
  title="Previous"
  class="btn btn-ghost btn-pagination"
  (click)="prevPage()"
  [disabled]="disabled || pageNumber === 1"
>
  <
</button>
<span> Page {{ pageNumber }} of {{ totalPages }} </span>
<button
  title="Next"
  class="btn btn-ghost btn-pagination"
  (click)="nextPage()"
  [disabled]="disabled || pageNumber === totalPages"
>
  >
</button>
